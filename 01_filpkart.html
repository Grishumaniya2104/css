<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wireframes</title>

    <style>
      table {
        width: 70%;
        margin: auto;
        border: 2px solid black;
        border-collapse: collapse;
        margin-top: 5px;
        font-size: 20px;
      }
      td {
        border: 2px solid black;
        text-align: center;
      }

      .box {
        height: 50px;
      }
      .small-box {
        height: 100px;
      }

      .medium-box {
        height: 200px;
      }
      .big-box {
        height: 250px;
      }
    </style>
  </head>
  <body>
    <table>
      <tr>
        <td class="box" width="15%">logo</td>
        <td class="box" width="15%">Travel</td>
        <td class="box" width="70%">Location</td>
      </tr>
    </table>

    <table>
      <tr>
        <td class="box" width="60%">search</td>
        <td class="box">Login</td>
        <td class="box">More</td>
        <td class="box">Cart</td>
      </tr>
    </table>

    <table>
      <tr>
        <td class="box">For you</td>
        <td class="box">Fashion</td>
        <td class="box">Mobile</td>
        <td class="box">Electronics</td>
        <td class="box">Beauty</td>
        <td class="box">Home</td>
        <td class="box">Applience</td>
        <td class="box">Toys</td>
        <td class="box">Food</td>
        <td class="box">AutoMobile</td>
        <td class="box">Sports</td>
        <td class="box">Furniture</td>
        <td class="box">Books</td>
        <td class="box">2 Wheeler</td>
      </tr>
    </table>

    <table>
      <tr>
        <td class="medium-box">Banner</td>
      </tr>
    </table>

    <table>
      <tr>
        <td class="medium-box">Banner-1</td>
        <td class="medium-box">Banner-2</td>
        <td class="medium-box">Banner-3</td>
      </tr>
    </table>

    <table>
        <tr>
            <td class="small-box">Product-1</td>
            <td class="small-box">Product-2</td>
            <td class="small-box">Product-3</td>
            <td class="small-box">Product-4</td>
        </tr>
    </table>

    <table>
        <tr>
            <td class="medium-box" >Flight</td>
        </tr>
    </table>

    <table>
        <tr>
            <td class="medium-box" >Footer</td>
        </tr>
    </table>

  </body>
</html>
